name: Windows

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: windows-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

permissions:
  contents: read

env:
  RUST_VERSION: "1.96.0"
  RUSTFMT_VERSION: "nightly-2026-06-23"
  RUSTFLAGS: "-Ctarget-feature=+crt-static -Dwarnings"

jobs:
  validate:
    name: Validate x86_64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Install Rust toolchains
        shell: pwsh
        run: |
          rustup toolchain install $Env:RUST_VERSION --profile minimal --component clippy
          rustup toolchain install $Env:RUSTFMT_VERSION --profile minimal --component rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: "true"
          cache-all-crates: "true"
          key: validate-${{ env.RUST_VERSION }}
      - name: Check formatting
        run: cargo +${{ env.RUSTFMT_VERSION }} fmt --check
      - name: Run Clippy
        run: cargo +${{ env.RUST_VERSION }} clippy --locked
      - name: Run tests
        run: cargo +${{ env.RUST_VERSION }} test --locked

  build:
    name: Build ${{ matrix.target }}
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-pc-windows-msvc
          - aarch64-pc-windows-msvc
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Install Rust toolchain
        shell: pwsh
        run: rustup toolchain install $Env:RUST_VERSION --profile minimal
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: "true"
          cache-all-crates: "true"
          key: build-${{ matrix.target }}-${{ env.RUST_VERSION }}
      - uses: houseabsolute/actions-rust-cross@v1
        with:
          command: build
          toolchain: ${{ env.RUST_VERSION }}
          target: ${{ matrix.target }}
          args: --locked --release
      - name: Build MSI
        shell: pwsh
        run: |
          cargo +$Env:RUST_VERSION install cargo-wix --locked
          cargo +$Env:RUST_VERSION wix --no-build -p komorebi --nocapture -I .\wix\main.wxs --target ${{ matrix.target }}
      - uses: actions/upload-artifact@v7
        with:
          name: komorebi-${{ matrix.target }}-${{ github.sha }}
          path: |
            target/${{ matrix.target }}/release/*.exe
            target/${{ matrix.target }}/release/*.pdb
            target/wix/komorebi-*.msi
          if-no-files-found: error
          retention-days: 14

  package:
    name: Package release artifacts
    needs: build
    runs-on: windows-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
      - name: Determine version
        id: version
        shell: pwsh
        run: |
          if ("${{ github.ref_type }}" -eq "tag") {
            $version = "${{ github.ref_name }}".TrimStart("v")
          } else {
            $version = "dry-run-${{ github.sha }}".Substring(0, 20)
          }
          "version=$version" >> $Env:GITHUB_OUTPUT
      - name: Create ZIP files, MSI files, and checksums
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $targets = @(
            "x86_64-pc-windows-msvc",
            "aarch64-pc-windows-msvc"
          )

          New-Item -ItemType Directory -Path release -Force | Out-Null
          $checksums = @()

          foreach ($target in $targets) {
            $artifactRoot = Join-Path "artifacts" "komorebi-$target-${{ github.sha }}"
            $releaseRoot = Join-Path $artifactRoot "$target\release"
            $zipName = "komorebi-$version-$target.zip"
            $zipPath = Join-Path "release" $zipName

            Compress-Archive -Force -Path "$releaseRoot\*.exe" -DestinationPath $zipPath
            $hash = (Get-FileHash -LiteralPath $zipPath -Algorithm SHA256).Hash.ToLowerInvariant()
            $checksums += "$hash  $zipName"

            $architecture = if ($target.StartsWith("x86_64")) { "x86_64" } else { "aarch64" }
            $msi = Get-ChildItem -Path (Join-Path $artifactRoot "wix") -Filter "*$architecture.msi" |
              Select-Object -First 1
            if (-not $msi) {
              throw "MSI not found for $target"
            }

            $msiName = "komorebi-$version-$architecture.msi"
            Copy-Item -LiteralPath $msi.FullName -Destination (Join-Path "release" $msiName)
            $msiHash = (Get-FileHash -LiteralPath (Join-Path "release" $msiName) -Algorithm SHA256).Hash.ToLowerInvariant()
            $checksums += "$msiHash  $msiName"
          }

          $checksums | Set-Content -LiteralPath "release\checksums.txt" -Encoding ascii
      - uses: actions/upload-artifact@v7
        with:
          name: release-${{ github.sha }}
          path: release/*
          if-no-files-found: error
          retention-days: 14

  release:
    name: Publish GitHub release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: package
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: release-${{ github.sha }}
          path: release
      - name: Publish or update release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag.TrimStart("v")
          $existing = gh release view $tag --repo "${{ github.repository }}" 2>$null

          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag release/* --clobber --repo "${{ github.repository }}"
          } else {
            gh release create $tag release/* `
              --repo "${{ github.repository }}" `
              --target "${{ github.sha }}" `
              --title "Komorebi $version — Desktop Isolation" `
              --generate-notes
          }

  scoop:
    name: Update Scoop manifest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: release
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0
      - uses: actions/download-artifact@v8
        with:
          name: release-${{ github.sha }}
          path: release
      - name: Update manifest
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          $assetName = "komorebi-$version-x86_64-pc-windows-msvc.zip"
          $assetPath = Join-Path "release" $assetName
          $hash = (Get-FileHash -LiteralPath $assetPath -Algorithm SHA256).Hash.ToLowerInvariant()

          $manifestPath = "bucket/komorebi-desktop-isolation.json"
          $manifest = Get-Content -LiteralPath $manifestPath -Raw | ConvertFrom-Json
          $manifest.version = $version
          $manifest.architecture.'64bit'.url = "https://github.com/${{ github.repository }}/releases/download/v$version/$assetName"
          $manifest.architecture.'64bit'.hash = $hash
          $manifest | ConvertTo-Json -Depth 20 | Set-Content -LiteralPath $manifestPath -Encoding utf8

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add $manifestPath

          if (git diff --cached --quiet) {
            Write-Host "Scoop manifest is already current"
            exit 0
          }

          git commit -m "chore(scoop): update manifest for v$version [skip ci]"
          git push origin main
